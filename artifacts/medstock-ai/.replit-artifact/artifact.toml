kind = "web"
previewPath = "/"
title = "MedStock AI"
version = "1.0.0"
id = "artifacts/medstock-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22965

[services.development]
run = "pnpm --filter @workspace/medstock-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medstock-ai", "run", "build" ]
publicDir = "artifacts/medstock-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22965"
BASE_PATH = "/"
